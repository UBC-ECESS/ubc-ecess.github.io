<!DOCTYPE html>
<html lang="en">

<head>
	<!-- META TAGS -->
	<title>UBC ECESS | Contact</title>
	<meta charset="UTF-8" />
	<meta name="description"
		content="Have a question? Interested in sponsoring us? Want to give us feedback or suggestions? Send us a message, and we'll get back to you!" />
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
	<!-- FAVICONS -->
	<link rel="icon" type="image/x-icon" href="favicon/favicon.ico" />
	<link rel="manifest" href="favicon/manifest.webmanifest" />
	<!-- STYLING -->
	<link rel="stylesheet" href="styles.css?version=8" />
	<link href="assets/css/fontawesome.css" rel="stylesheet" />
	<link href="assets/css/solid.css" rel="stylesheet" />
	<link href="assets/css/brands.css" rel="stylesheet" />
</head>

<body id="contact-page" tabindex="0">
	<div class="section-header">
		<div id="reload-indicator"></div>
		<img src="media/headers/contact.jpg">
		<div>
			<h1 class="section-title">CONTACT</h1>
		</div>
	</div>
	<div id="content">
		<div class="inner">
			<!-- <h2>Reach out!</h2> -->
			<p class="below-header" style="max-width: 720px;">Have a question? Interested in sponsoring us? Want to give us
				feedback or suggestions? Send us a message, and we'll get back to you!</p>

			<form action="https://api.web3forms.com/submit" method="POST">
				<!-- REQUIRED -->
				<input id="form-key" type="hidden" name="access_key">

				<!-- OPTIONAL -->
				<input id="form-subject" type="hidden" name="subject" value="Website Contact Message (General)">
				<input type="hidden" name="from_name">
				<input type="checkbox" name="botcheck" class="hidden" style="display: none;">

				<!-- DATA -->
				<div class="form-container">
					<div style="flex: 1 0 30%;">
						<label for="name">
							<h3>Name</h3>
						</label>
						<input id="name" type="text" name="name" style="width: 100%;" required>
					</div>
					<div style="flex: 1 0 30%;">
						<label for="email">
							<h3>Email</h3>
						</label>
						<input id="email" type="email" name="email" required>
					</div>
					<div style="flex-shrink: 0; width: 100%;">
						<label for="message">
							<h3>Message</h3>
						</label>
						<textarea id="message" name="message" rows="5" required></textarea>
					</div>
					<div style="flex: 1 0 30%;">
						<select id="form-type"></select>
					</div>
					<div style="flex: 1 0 30%;">
						<button id="send" type="submit" class="button important"><i
								class="fa-solid fa-paper-plane"></i><span>Send</span></button>
					</div>
				</div>
			</form>
		</div>
	</div>
	<script type="module" src="app.js"></script>
</body>

</html>
