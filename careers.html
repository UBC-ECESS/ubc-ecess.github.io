<!DOCTYPE html>
<html lang="en">

<head>
	<!-- META TAGS -->
	<title>UBC ECESS | Career</title>
	<meta charset="UTF-8" />
	<meta name="description"
		content="Meet ECESS supporters! Interested in sponsoring us? Check out our sponsorship package to see what we offer, and if something interests you, reach out!" />
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
	<!-- FAVICONS -->
	<link rel="icon" type="image/png" sizes="48x48" href="favicon/favicon-48x48.png" />
	<link rel="icon" type="image/png" sizes="128x128" href="favicon/favicon-128x128.png" />
	<link rel="icon" type="image/png" sizes="192x192" href="favicon/android-chrome-192x192.png" />
	<link rel="icon" type="image/png" sizes="512x512" href="favicon/android-chrome-512x512.png" />
	<link rel="apple-touch-icon" type="image/png" href="favicon/apple-touch-icon.png" />
	<link rel="icon" type="image/x-icon" href="favicon/favicon.ico" />
	<link rel="manifest" href="favicon/manifest.webmanifest" />
	<!-- STYLING -->
	<link rel="stylesheet" href="styles.css?version=10" />
	<link rel="stylesheet" href="css/careers.css?version=1" />
	<link href="assets/css/fontawesome.css" rel="stylesheet" />
	<link href="assets/css/solid.css" rel="stylesheet" />
	<link href="assets/css/brands.css" rel="stylesheet" />
</head>

<body id="careers-page" tabindex="0">
	<div class="section-header">
		<div id="reload-indicator"></div>
		<img src="media/headers/sponsors.jpg">
		<div>
			<h1 class="section-title">CAREERS</h1>
		</div>
	</div>
	<div id="content">
		<div id="alumni-marquee">
			<h2>Our Alumni Work At</h2>
			<div class="marquee-outer">
				<div class="marquee-track" id="marquee-track"></div>
			</div>
		</div>
		<div class="inner">
			<!-- <h2>Reach out!</h2> -->
			<p class="below-header" style="max-width: 640px;">
				Meet ECESS supporters! Interested in sponsoring us?
				Check out our sponsorship package to see what we offer, and if something interests you, <a class="link"
					href="./contact">reach out</a>!</p>
			<!-- <h2 style="margin-bottom: 0;">Tiers</h2> -->
			<div id="sponsors-container">
				<div>
					<h2>Sponsors</h2>
					<ul id="tiers" class="tiers"></ul>
				</div>
				<div>
					<h2>Package</h2>
					<div id="package-container">
						<iframe id="package" allowfullscreen></iframe>
					</div>
					<h2>Get in Touch</h2>
					<form action="https://api.web3forms.com/submit" method="POST" style="margin-top: 0px;">
						<!-- REQUIRED -->
						<input id="form-key" type="hidden" name="access_key">

						<!-- OPTIONAL -->
						<input id="form-subject" type="hidden" name="subject" value="Website Contact Message (Sponsorship)">
						<input type="hidden" name="from_name">
						<input type="checkbox" name="botcheck" class="hidden" style="display: none;">

						<!-- DATA -->
						<div class="form-container">
							<div style="flex: 1 0 30%;">
								<label for="name">
									<h3>Name</h3>
								</label>
								<input id="name" type="text" name="name" style="width: 100%;" required>
							</div>
							<div style="flex: 1 0 30%;">
								<label for="email">
									<h3>Email</h3>
								</label>
								<input id="email" type="email" name="email" required>
							</div>
							<div style="flex-shrink: 0; width: 100%;">
								<label for="message">
									<h3>Message</h3>
								</label>
								<textarea id="message" name="message" rows="5" required></textarea>
							</div>
							<div style="flex: 1 0 100%;">
								<button id="send" type="submit" class="button important"><i
										class="fa-solid fa-paper-plane"></i><span>Send</span></button>
							</div>
						</div>
					</form>
				</div>
			</div>
		</div>
	</div>
	</div>
	<script type="module" src="js/careers.js"></script>
</body>

</html>
